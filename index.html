<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Content Removed</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6e6e6;
    }

    .header {
      background: #111820;
      padding: 15px 25px;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid #222;
    }

    .container {
      width: 60%;
      margin: 40px auto;
      background: #121a24;
      padding: 25px;
      border-radius: 10px;
      border: 1px solid #1f2a38;
      text-align: center;
    }

    .status {
      font-size: 18px;
      color: #ff4d4d;
      font-weight: bold;
    }

    .msg {
      margin-top: 15px;
      color: #aaa;
      font-size: 14px;
      line-height: 1.6;
    }

    .hint {
      margin-top: 20px;
      font-size: 13px;
      color: #777;
    }

    .broken {
      margin-top: 25px;
      font-size: 13px;
      color: #555;
      border: 1px dashed #333;
      padding: 15px;
    }
  </style>
</head>

<body>

  <div class="header">
    Internal Communications Log
  </div>

  <div class="container">

    <div class="status">
      Content Removed
    </div>

    <div class="msg">
      This post has been permanently deleted following a compliance investigation.
      All associated media has been removed from active servers.
    </div>

    <div class="broken">
      <code>tweet.jpg → NOT FOUND (404)</code>
    </div>

    <div class="hint">
      Some content may still exist in external web archives.
    </div>

  </div>

</body>
</html>
